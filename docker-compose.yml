services:
  db:
    image: postgres
    env_file: .env
    networks:
      - chronos_net
    ports:
      - 5432:5432
    volumes: 
        - pg_data:/var/lib/postgresql

  django:
    build: 
      dockerfile: python.dockerfile
    working_dir: /var/www/django
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    networks:
      - chronos_net
    ports:
      - 8000:8000
    volumes:
      - ./chronos:/var/www/django/chronos
      - ./manage.py:/var/www/django/manage.py

volumes:
  pg_data:

networks:
  chronos_net: