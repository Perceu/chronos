{% extends 'content.html'%}

{% block 'content'%}

<div class="card">
    <div class="card-header">
        <h3 class="card-title">Produtividade por Usuário</h3>
    </div>

    <div class="card-body">
        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th>Usuário</th>
                    <th>Total de Horas</th>
                </tr>
            </thead>
            <tbody>
                {% for item in dados %}
                <tr>
                    <td>{{ item.usuario__user__username }}</td>
                    <td>{{ item.total }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2">Nenhum dado encontrado</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
