{% extends 'content.html'%}

{% block 'content'%}

<div class="card">
    <div class="card-header">
        <h3 class="card-title">Ranking de Produtividade</h3>
    </div>

    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Usuário</th>
                    <th>Horas</th>
                    <th>Registros</th>
                </tr>
            </thead>
            <tbody>
                {% for item in dados %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ item.usuario__user__username }}</td>
                    <td>{{ item.total }}</td>
                    <td>{{ item.registros }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4">Nenhum dado encontrado</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
